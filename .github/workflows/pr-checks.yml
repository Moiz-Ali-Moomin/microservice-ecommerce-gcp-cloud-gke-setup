name: PR Checks

# Lightweight, fast feedback loop for pull requests.
# Completes in < 5 minutes to avoid blocking developer velocity.

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24.0"
  COVERAGE_THRESHOLD: "80"

jobs:
  # ── Fast compile check ────────────────────────────────────────────────────
  build:
    name: "🔨 Compile"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.work.sum
      - run: cd services && go build ./...

  # ── Tests + Coverage ──────────────────────────────────────────────────────
  test:
    name: "🧪 Test & Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.work.sum

      - name: Run Tests
        run: |
          cd services
          go test ./... -race -coverprofile=../coverage.out -covermode=atomic -timeout 90s

      - name: Enforce Coverage ≥${{ env.COVERAGE_THRESHOLD }}%
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
            echo "❌ Coverage ${COVERAGE}% < required ${{ env.COVERAGE_THRESHOLD }}%"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets threshold"

      - name: Comment Coverage on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const coverage = require('child_process')
              .execSync('go tool cover -func=coverage.out | tail -1 | awk \'{print $3}\'')
              .toString().trim();
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Coverage Report\n\n**Total Coverage: ${coverage}** (threshold: ${{ env.COVERAGE_THRESHOLD }}%)\n\n> Run \`go tool cover -html=coverage.out\` locally to inspect line coverage.`
            });

  # ── Filesystem Security Scan ──────────────────────────────────────────────
  trivy-scan:
    name: "🔒 Trivy FS Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.16.1
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-pr-results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-pr-results.sarif

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: "📝 Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: revive
        run: |
          go install github.com/mgechev/revive@v1.3.7
          cd services && revive ./... | tee lint-report.txt
          # Fail on error-level lint issues
          if grep -q '\[error\]' lint-report.txt; then
            echo "❌ Lint errors found"
            exit 1
          fi
          echo "✅ Lint passed"
