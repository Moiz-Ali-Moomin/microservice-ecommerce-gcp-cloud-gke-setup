# infra/kafka/topics/dlq-topics.yaml
#
# Dead-Letter Queue (DLQ) Topics
# ─────────────────────────────────────────────────────────────────────────────
# Every Kafka topic that has a consumer group with business logic gets a
# corresponding <topic>.dlq topic. Messages are routed here after exhausting
# the retry budget in DLQConsumer (shared-lib/pkg/event/dlq.go).
#
# DLQ topics:
#  - Longer retention (30 days) for investigation
#  - Fewer partitions (1 replayable shard is enough)
#  - compact+delete cleanup so latest state per key is retained
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: checkout.completed.dlq
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
    tier: dlq
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000        # 30 days
    min.insync.replicas: 2
    cleanup.policy: delete
    segment.bytes: 1073741824
---
