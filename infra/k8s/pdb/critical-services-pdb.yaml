# PodDisruptionBudgets for critical ecommerce services.
# Ensures at least 1 pod remains available during node drain/upgrades.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: ecommerce
  labels:
    app.kubernetes.io/managed-by: "argocd"
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway
---
