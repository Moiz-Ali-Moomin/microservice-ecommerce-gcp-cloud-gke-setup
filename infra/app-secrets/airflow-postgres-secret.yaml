# infra/app-secrets/airflow-postgres-secret.yaml
#
# ExternalSecret: Airflow PostgreSQL credentials
# AUDIT FIX: Airflow values.yaml previously had plaintext credentials.
# This ExternalSecret pulls them from GCP Secret Manager.
#
# Required GCP Secret: "airflow-postgres-creds" with keys:
#   - postgres-password
#   - password
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: airflow-postgres-secret
  namespace: tooling-airflow
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: airflow-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: airflow-postgres-creds
        property: postgres-password
    - secretKey: password
      remoteRef:
        key: airflow-postgres-creds
        property: password
