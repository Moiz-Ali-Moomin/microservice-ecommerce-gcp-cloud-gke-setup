# infra/app-secrets/order-service.yaml
#
# ExternalSecret: order-service database credentials
# AUDIT FIX (R1): order-service now uses PostgreSQL persistence.
# POSTGRES_DSN is the only credential it needs — Cloud SQL Proxy handles auth.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: order-service-db
  namespace: apps-core
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-store
    kind: ClusterSecretStore
  target:
    name: order-service-secrets
    creationPolicy: Owner
  data:
    # DSN format: postgres://user:pass@127.0.0.1:5432/orders?sslmode=disable
    # The Cloud SQL Auth Proxy sidecar listens on 127.0.0.1:5432
    - secretKey: POSTGRES_DSN
      remoteRef:
        key: order-service-db
        property: dsn
