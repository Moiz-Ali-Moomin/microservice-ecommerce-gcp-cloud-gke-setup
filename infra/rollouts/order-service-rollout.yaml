apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: order-service
  namespace: ecommerce
spec:
  replicas: 5
  strategy:
    canary:
      # Istio traffic routing definition
      trafficRouting:
        istio:
          virtualService: 
            name: order-service-routing
          destinationRule:
            name: order-service-resilience
            canarySubsetName: canary
            stableSubsetName: stable
      # Progressive rollout steps
      # Analysis template gates each promotion step
      analysis:
        templates:
          - templateName: order-service-canary-analysis
        startingStep: 2   # begin analysis after first traffic shift
        args:
          - name: stable-hash
            valueFrom:
              podTemplateHashValue: Stable
          - name: canary-hash
            valueFrom:
              podTemplateHashValue: Latest

      steps:
      # 5% canary — fast smoke test
      - setWeight: 5
      - pause: {duration: 3m}
      # Analysis gates error rate + latency before promoting
      - analysis:
          templates:
            - templateName: order-service-canary-analysis
      # 20% canary — validate at scale
      - setWeight: 20
      - pause: {duration: 5m}
      - analysis:
          templates:
            - templateName: order-service-canary-analysis
      # 50% canary — production parity check
      - setWeight: 50
      - pause: {duration: 5m}
      - analysis:
          templates:
            - templateName: order-service-canary-analysis
      # 100% — promote only if all gates pass
      - setWeight: 100
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      serviceAccountName: order-service-sa
      containers:
      - name: order-service
        image: us-central1-docker.pkg.dev/my-project/ecommerce-repo/order-service:{{ .Values.image.tag }}
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
