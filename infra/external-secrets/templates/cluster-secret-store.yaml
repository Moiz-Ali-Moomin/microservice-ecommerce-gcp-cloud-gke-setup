apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-store
spec:
  provider:
    gcpsm:
      projectID: ecommerce-microservice-53
      auth:
        workloadIdentity:
          # ── AUDIT FIX ──────────────────────────────────────────────────────
          # clusterName must match the GKE cluster name from Terraform:
          #   google_container_cluster.cell.name = "ecommerce-cell-1"
          # Old value "ecommerce-platform-prod" → Workload Identity 403 on all secrets
          # ───────────────────────────────────────────────────────────────────
          clusterName: ecommerce-cell-1
          clusterLocation: us-central1
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets