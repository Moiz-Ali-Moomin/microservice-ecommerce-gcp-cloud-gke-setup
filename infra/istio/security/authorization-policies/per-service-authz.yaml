# ── 10. feature-flag-service ─────────────────────────────────────────────────
# Widely consumed — allow all application namespaces but still principal-pinned
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: feature-flag-service-authz
  namespace: apps-core
spec:
  selector:
    matchLabels:
      app: feature-flag-service
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - "apps-core"
              - "apps-public"
              - "apps-async"
      to:
        - operation:
            methods: ["GET"]
            ports: ["8080"]
---
# ── 11. audit-service ────────────────────────────────────────────────────────
# Write-only from all services; read only from admin-backoffice
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: audit-service-authz
  namespace: apps-async
spec:
  selector:
    matchLabels:
      app: audit-service
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["apps-core", "apps-public"]
      to:
        - operation:
            methods: ["POST"]
            ports: ["8080"]
    - from:
        - source:
            principals:
              - "cluster.local/ns/apps-core/sa/admin-backoffice-service-sa"
      to:
        - operation:
            methods: ["GET"]
            ports: ["8080"]
---
