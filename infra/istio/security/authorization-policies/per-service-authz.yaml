# infra/istio/security/authorization-policies/per-service-authz.yaml
#
# Per-Service SPIFFE-principal AuthorizationPolicies
# ─────────────────────────────────────────────────────────────────────────────
# Replaces the over-broad namespace-level trust in ecommerce-authz.yaml.
# Every service only accepts connections from its EXACT known callers,
# identified by their Kubernetes Service Account (SPIFFE URI).
#
# Pattern:  cluster.local/ns/<namespace>/sa/<service-account-name>
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. order-service ─────────────────────────────────────────────────────────
# Accepts traffic from: api-gateway (user checkout), cart-service (order init)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: order-service-authz
  namespace: apps-core
spec:
  selector:
    matchLabels:
      app: order-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/apps-public/sa/api-gateway-sa"
              - "cluster.local/ns/apps-core/sa/cart-service-sa"
      to:
        - operation:
            methods: ["POST", "GET", "PUT"]
            ports: ["8080"]
---
# ── 2. product-service ───────────────────────────────────────────────────────
# Accepts traffic from: api-gateway, storefront-service, cart-service
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: product-service-authz
  namespace: apps-core
spec:
  selector:
    matchLabels:
      app: product-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/apps-public/sa/api-gateway-sa"
              - "cluster.local/ns/apps-public/sa/storefront-service-sa"
              - "cluster.local/ns/apps-core/sa/cart-service-sa"
              - "cluster.local/ns/apps-core/sa/offer-service-sa"
              - "cluster.local/ns/platform-observability/sa/prometheus-sa"
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE"]
            ports: ["8080"]
---
# ── 3. cart-service ──────────────────────────────────────────────────────────
# Accepts traffic from: api-gateway, storefront-service
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: cart-service-authz
  namespace: apps-core
spec:
  selector:
    matchLabels:
      app: cart-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/apps-public/sa/api-gateway-sa"
              - "cluster.local/ns/apps-public/sa/storefront-service-sa"
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE"]
            ports: ["8080"]
---
# ── 4. auth-service ──────────────────────────────────────────────────────────
# Accepts traffic from: api-gateway ONLY (JWT issuance is a privileged operation)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: auth-service-authz
  namespace: apps-core
spec:
  selector:
    matchLabels:
      app: auth-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/apps-public/sa/api-gateway-sa"
              - "cluster.local/ns/apps-public/sa/storefront-service-sa"
      to:
        - operation:
            methods: ["POST", "GET"]
            ports: ["8080"]
---
# ── 5. user-service ──────────────────────────────────────────────────────────
# Accepts traffic from: api-gateway, auth-service, notification-service, admin-backoffice
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: user-service-authz
  namespace: apps-core
spec:
  selector:
    matchLabels:
      app: user-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/apps-public/sa/api-gateway-sa"
              - "cluster.local/ns/apps-core/sa/auth-service-sa"
              - "cluster.local/ns/apps-async/sa/notification-service-sa"
              - "cluster.local/ns/apps-core/sa/admin-backoffice-service-sa"
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE"]
            ports: ["8080"]
---
# ── 6. notification-service ──────────────────────────────────────────────────
