apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ecommerce-all
  namespace: istio-system
  # ─────────────────────────────────────────────────────────────────────────
  # AUDIT FIX — 2026-03-20
  #
  # All host references corrected to match actual ArgoCD deployment namespaces.
  # Cross-check: argocd/apps/services.yaml is the source of truth for namespaces.
  #
  # Bugs fixed:
  #  - cart-service:    ecommerce  → apps-core
  #  - offer-service:   ecommerce  → apps-core
  #  - product-service: ecommerce  → apps-core
  #  - admin-backoffice: tooling   → apps-core
  #  - feature-flag:   tooling     → apps-core
  #  - conversion-webhook: apps-public → apps-public (unchanged, matches ArgoCD)
  #  - reporting-service: apps-async → apps-core (matches ArgoCD destination)
  #
  # NOTE: VirtualService moved to istio-system so it can bind to the
  #       main-gateway (Gateway lives in istio-system). Previously it was in
  #       namespace: ecommerce which does not exist as a deployment target —
  #       Istio requires VS and Gateway to share namespace or VS must reference
  #       gateway with full <ns>/<name> — that was already correct, but the VS
  #       itself being in a phantom namespace means it never applied.
  # ─────────────────────────────────────────────────────────────────────────
spec:
  hosts:
    - "*"
  gateways:
    - istio-system/main-gateway
  http:
    # ── Admin Backoffice (apps-core — ArgoCD destination) ───────────────────
    - match:
        - uri:
            prefix: /admin-backoffice
      rewrite:
        uri: /
      route:
        - destination:
            host: admin-backoffice-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Analytics Ingest (apps-async) ───────────────────────────────────────
    - match:
        - uri:
            prefix: /analytics-ingest
      rewrite:
        uri: /
      route:
        - destination:
            host: analytics-ingest-service.apps-async.svc.cluster.local
            port:
              number: 8080

    # ── API Gateway (apps-public) ────────────────────────────────────────────
    - match:
        - uri:
            prefix: /api
      rewrite:
        uri: /
      route:
        - destination:
            host: api-gateway.apps-public.svc.cluster.local
            port:
              number: 8080

    # ── Attribution (apps-async) ─────────────────────────────────────────────
    - match:
        - uri:
            prefix: /attribution
      rewrite:
        uri: /
      route:
        - destination:
            host: attribution-service.apps-async.svc.cluster.local
            port:
              number: 8080

    # ── Audit (apps-async) ───────────────────────────────────────────────────
    - match:
        - uri:
            prefix: /audit
      rewrite:
        uri: /
      route:
        - destination:
            host: audit-service.apps-async.svc.cluster.local
            port:
              number: 8080

    # ── Auth (apps-core) ─────────────────────────────────────────────────────
    - match:
        - uri:
            prefix: /auth
      rewrite:
        uri: /
      route:
        - destination:
            host: auth-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Cart (apps-core — was WRONG: ecommerce) ──────────────────────────────
    - match:
        - uri:
            prefix: /cart
      rewrite:
        uri: /
      route:
        - destination:
            host: cart-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Conversion Webhook (apps-public — matches ArgoCD) ───────────────────
    - match:
        - uri:
            prefix: /conversion-webhook
      rewrite:
        uri: /
      route:
        - destination:
            host: conversion-webhook.apps-public.svc.cluster.local
            port:
              number: 8080

    # ── Feature Flag (apps-core — was WRONG: tooling) ───────────────────────
    - match:
        - uri:
            prefix: /feature-flag
      rewrite:
        uri: /
      route:
        - destination:
            host: feature-flag-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Landing (apps-public) ────────────────────────────────────────────────
    - match:
        - uri:
            prefix: /landing
      rewrite:
        uri: /
      route:
        - destination:
            host: landing-service.apps-public.svc.cluster.local
            port:
              number: 8080

    # ── Notification (apps-async) ────────────────────────────────────────────
    - match:
        - uri:
            prefix: /notification
      rewrite:
        uri: /
      route:
        - destination:
            host: notification-service.apps-async.svc.cluster.local
            port:
              number: 8080

    # ── Offer (apps-core — was WRONG: ecommerce) ─────────────────────────────
    - match:
        - uri:
            prefix: /offer
      rewrite:
        uri: /
      route:
        - destination:
            host: offer-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Orders (apps-core) ───────────────────────────────────────────────────
    - match:
        - uri:
            prefix: /orders
      rewrite:
        uri: /
      route:
        - destination:
            host: order-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Product (apps-core — was WRONG: ecommerce) ───────────────────────────
    - match:
        - uri:
            prefix: /product
      rewrite:
        uri: /
      route:
        - destination:
            host: product-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Redirect (apps-public) ───────────────────────────────────────────────
    - match:
        - uri:
            prefix: /redirect
      rewrite:
        uri: /
      route:
        - destination:
            host: redirect-service.apps-public.svc.cluster.local
            port:
              number: 8080

    # ── Reporting (apps-core — was WRONG: apps-async — per ArgoCD) ──────────
    - match:
        - uri:
            prefix: /reporting
      rewrite:
        uri: /
      route:
        - destination:
            host: reporting-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Storefront (apps-public) ─────────────────────────────────────────────
    - match:
        - uri:
            prefix: /storefront
      rewrite:
        uri: /
      route:
        - destination:
            host: storefront-service.apps-public.svc.cluster.local
            port:
              number: 8080

    # ── User (apps-core) ─────────────────────────────────────────────────────
    - match:
        - uri:
            prefix: /user
      rewrite:
        uri: /
      route:
        - destination:
            host: user-service.apps-core.svc.cluster.local
            port:
              number: 8080

    # ── Default catch-all → storefront ───────────────────────────────────────
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: storefront-service.apps-public.svc.cluster.local
            port:
              number: 8080
